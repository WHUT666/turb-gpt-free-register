name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          SSL_VERIFY: "False"
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Import smoke (CLI modules)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "from config.runtime_paths import data_root, resource_root; from core.yahoos_client import generate_local_part; from core.email_provider import parse_email_sources; assert 'yahoos' in parse_email_sources('yahoos'); print('ok', generate_local_part())"

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: turb-gpt-register-linux
          - os: windows-latest
            artifact: turb-gpt-register-windows
          - os: macos-latest
            artifact: turb-gpt-register-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements.txt

      - name: Set up Node.js (sentinel runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install "pyinstaller>=6.0"

      - name: PyInstaller build
        shell: bash
        run: |
          set -euo pipefail
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --distpath dist \
            --workpath build/pyinstaller \
            build/turb_gpt_register.spec
          python tools/write_dist_sidecars.py
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f dist/turb-gpt-register.exe
          else
            test -f dist/turb-gpt-register
            chmod +x dist/turb-gpt-register
          fi
          test -f dist/README.txt
          test -f dist/.env.example

      - name: Smoke run --help (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          Get-ChildItem dist | Format-Table Name, Length
          if (-not (Test-Path .\dist\turb-gpt-register.exe)) {
            throw "missing dist/turb-gpt-register.exe"
          }
          # CI runner 默认控制台代码页常为 cp1252，强制 UTF-8 后再跑 --help
          chcp 65001 | Out-Null
          $OutputEncoding = [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          & .\dist\turb-gpt-register.exe --help
          if ($LASTEXITCODE -ne 0) { throw "exe --help exit $LASTEXITCODE" }

      - name: Smoke run --help (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          test -f dist/turb-gpt-register
          chmod +x dist/turb-gpt-register
          ./dist/turb-gpt-register --help

      - name: Package artifact folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifact/${{ matrix.artifact }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/turb-gpt-register.exe "artifact/${{ matrix.artifact }}/"
          else
            cp dist/turb-gpt-register "artifact/${{ matrix.artifact }}/"
            chmod +x "artifact/${{ matrix.artifact }}/turb-gpt-register"
          fi
          cp dist/README.txt dist/.env.example "artifact/${{ matrix.artifact }}/"
          # 方便用户直接改代理；不包含真实密钥
          cp dist/.env.example "artifact/${{ matrix.artifact }}/.env"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/${{ matrix.artifact }}/
          if-no-files-found: error
          retention-days: 14
