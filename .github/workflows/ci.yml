name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          SSL_VERIFY: "False"
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Import smoke (CLI modules)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "from config.runtime_paths import data_root, resource_root; from core.yahoos_client import generate_local_part; from core.email_provider import parse_email_sources; assert 'yahoos' in parse_email_sources('yahoos'); print('ok', generate_local_part())"

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: turb-gpt-register-linux
          - os: windows-latest
            artifact: turb-gpt-register-windows
          - os: macos-latest
            artifact: turb-gpt-register-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements.txt

      - name: Set up Node.js (sentinel runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install "pyinstaller>=6.0"

      - name: PyInstaller build
        shell: bash
        run: |
          set -euo pipefail
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --distpath dist \
            --workpath build/pyinstaller \
            build/turb_gpt_register.spec
          python tools/write_dist_sidecars.py
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f dist/turb-gpt-register.exe
          else
            test -f dist/turb-gpt-register
            chmod +x dist/turb-gpt-register
          fi
          test -f dist/README.txt
          test -f dist/.env.example

      - name: Smoke run --help (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          Get-ChildItem dist | Format-Table Name, Length
          if (-not (Test-Path .\dist\turb-gpt-register.exe)) {
            throw "missing dist/turb-gpt-register.exe"
          }
          chcp 65001 | Out-Null
          $OutputEncoding = [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          & .\dist\turb-gpt-register.exe --help
          if ($LASTEXITCODE -ne 0) { throw "exe --help exit $LASTEXITCODE" }

      - name: Smoke run --help (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          test -f dist/turb-gpt-register
          chmod +x dist/turb-gpt-register
          ./dist/turb-gpt-register --help

      - name: Package artifact folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifact/${{ matrix.artifact }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/turb-gpt-register.exe "artifact/${{ matrix.artifact }}/"
          else
            cp dist/turb-gpt-register "artifact/${{ matrix.artifact }}/"
            chmod +x "artifact/${{ matrix.artifact }}/turb-gpt-register"
          fi
          cp dist/README.txt dist/.env.example "artifact/${{ matrix.artifact }}/"
          cp dist/.env.example "artifact/${{ matrix.artifact }}/.env"
          # Release 用 zip，方便下载（全平台用 Python，避免 Windows 缺 zip）
          python - <<'PY'
          import pathlib, zipfile
          name = "${{ matrix.artifact }}"
          root = pathlib.Path("artifact") / name
          zpath = pathlib.Path("artifact") / f"{name}.zip"
          with zipfile.ZipFile(zpath, "w", zipfile.ZIP_DEFLATED) as zf:
              for p in root.rglob("*"):
                  if p.is_file():
                      zf.write(p, p.relative_to(root.parent).as_posix())
          print("wrote", zpath, "bytes", zpath.stat().st_size)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            artifact/${{ matrix.artifact }}/
            artifact/${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect zip assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find release-assets -type f -name '*.zip' -print -exec cp {} upload/ \;
          ls -lah upload
          test -f upload/turb-gpt-register-windows.zip
          test -f upload/turb-gpt-register-linux.zip
          test -f upload/turb-gpt-register-macos.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## turb-gpt-register ${{ github.ref_name }}

            跨平台 CLI 注册工具（默认 `EMAIL_SOURCE=yahoos`，同目录 `.env` 配置代理）。

            ### 下载
            - **Windows**: `turb-gpt-register-windows.zip`
            - **Linux**: `turb-gpt-register-linux.zip`
            - **macOS**: `turb-gpt-register-macos.zip`

            ### 使用
            1. 解压后编辑同目录 `.env`（`PROXY_POOL=socks5://127.0.0.1:7897` 等）
            2. 本机需安装 Node.js（Sentinel）
            3. 运行：
               - Windows: `turb-gpt-register.exe -n 1 --verbose`
               - Linux/macOS: `./turb-gpt-register -n 1 --verbose`

            CI Artifacts 也会保留约 14 天，可在 Actions 页面下载。
          files: |
            upload/turb-gpt-register-windows.zip
            upload/turb-gpt-register-linux.zip
            upload/turb-gpt-register-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
